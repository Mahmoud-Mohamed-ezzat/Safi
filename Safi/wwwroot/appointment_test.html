<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safi Hospital | Appointment Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .dashboard-header {
            max-width: 1200px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 992px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0f172a;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            gap: 6px;
        }

        .status-badge.connected {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-badge.disconnected {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .connected .status-dot { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .disconnected .status-dot { background-color: var(--danger); }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input[readonly] {
            background-color: #f8fafc;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary { background: var(--secondary); }
        .btn-secondary:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
        }
        .btn-outline:hover { background: #f8fafc; border-color: #cbd5e1; }

        button:disabled {
            background: #cbd5e1 !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #log-container {
            margin-top: 24px;
            grid-column: 1 / -1;
        }

        #log {
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 16px;
            height: 350px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 3px solid transparent;
        }

        .log-entry.success { color: #4ade80; border-left-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .log-entry.error { color: #f87171; border-left-color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .log-entry.info { color: #60a5fa; border-left-color: #60a5fa; background: rgba(96, 165, 250, 0.1); }

        .log-time {
            color: #94a3b8;
            margin-right: 10px;
            font-size: 0.75rem;
        }

        .room-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .room-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-card.available {
            border-color: #dcfce7;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.05);
        }

        .room-card.available:hover {
            border-color: var(--success);
            transform: scale(1.02);
            cursor: pointer;
        }

        .room-card.busy {
            border-color: #fee2e2;
            background-color: #fcfcfc;
            opacity: 0.9;
        }

        .room-card .type-badge {
            position: absolute;
            top: 0;
            right: 0;
            padding: 4px 12px;
            border-bottom-left-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .room-card.Room .type-badge { background: #dbeafe; color: #1e40af; }
        .room-card.ICU .type-badge { background: #fef3c7; color: #92400e; }
        .room-card.Emergency .type-badge { background: #fee2e2; color: #991b1b; }

        .room-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
        }

        .room-dept {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .room-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .room-card.available .room-status { color: var(--success); }
        .room-card.busy .room-status { color: var(--danger); }

        .doctor-list {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f1f5f9;
        }

        .doctor-item {
            font-size: 0.8125rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .doctor-item::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .room-card {
            animation: fadeIn 0.4s ease-out backwards;
        }

        #appointmentSection.active {
            animation: pulse 2s infinite;
            border: 2px solid var(--success);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

<body>
    <header class="dashboard-header">
        <h1>🏥 Safi Hospital Dashboard</h1>
        <p>Real-time Appointment & Room Management System</p>
    </header>

    <main class="main-grid">
        <!-- Connection Control -->
        <section class="glass-panel">
            <h2>📡 Connectivity</h2>
            <div id="status" class="status-badge disconnected">
                <span class="status-dot"></span>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="btn-group">
                <button id="connectBtn" class="btn-primary" onclick="connect()">
                    Connect to Hub
                </button>
                <button id="disconnectBtn" class="btn-outline" onclick="disconnect()" disabled>
                    Disconnect
                </button>
            </div>
        </section>

        <!-- Group Management -->
        <section class="glass-panel">
            <h2>👥 Room Subscriptions</h2>
            <div class="input-group">
                <label>Department</label>
                <select id="departmentId">
                    <option value="1">Cardiology (1)</option>
                    <option value="2">Neurology (2)</option>
                    <option value="3">Pediatrics (3)</option>
                    <option value="4">Emergency (4)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Room Category</label>
                <select id="roomType">
                    <option value="Room">General Ward</option>
                    <option value="ICU">Intensive Care (ICU)</option>
                    <option value="Emergency">Emergency Unit</option>
                </select>
            </div>
            <div class="btn-group">
                <button onclick="joinGroup()" class="btn-primary">Subscribe</button>
                <button onclick="getAvailableRooms()" class="btn-secondary">Refresh Rooms</button>
            </div>
        </section>

        <!-- Room Action -->
        <section class="glass-panel">
            <h2>🔒 Room Operations</h2>
            <div class="input-group">
                <label>Target Room ID</label>
                <input type="number" id="blockRoomId" placeholder="Enter Room ID manually or click a card" />
            </div>
            <div class="input-group">
                <label>Operator ID</label>
                <input type="text" id="userId" value="nurse_admin_01" />
            </div>
            <div class="btn-group">
                <button onclick="blockRoom()" class="btn-primary">Block Selected Room</button>
            </div>
        </section>

        <!-- Appointment Creation -->
        <section class="glass-panel" id="appointmentSection">
            <h2>📅 Create Appointment</h2>
            <div class="input-group">
                <label>Patient ID</label>
                <input type="text" id="patientId" value="PAT-8829" />
            </div>
            <div class="input-group">
                <label>Linked Room</label>
                <input type="number" id="appointmentRoomId" readonly placeholder="None selected" />
            </div>
            <div class="input-group">
                <label>Assigned Physician</label>
                <select id="primaryDoctorId">
                    <option value="">Block a room to load doctors</option>
                </select>
            </div>
            <div class="input-group">
                <label>Created By (Staff ID)</label>
                <input type="text" id="createdBy" value="reception_desk_01" />
            </div>
            <div class="btn-group">
                <button onclick="createAppointment()" class="btn-primary" id="createAppBtn" disabled>Finalize Appointment</button>
            </div>
        </section>

        <!-- Room Release -->
        <section class="glass-panel">
            <h2>🔓 Discharge / Release</h2>
            <div class="input-group">
                <label>Room ID</label>
                <input type="number" id="releaseRoomId" />
            </div>
            <div class="input-group">
                <label>Doctor Authorization ID</label>
                <input type="text" id="releaseDoctorId" value="DOC-001" />
            </div>
            <div class="input-group">
                <label>Type</label>
                <select id="releaseRoomType">
                    <option value="Room">General Ward</option>
                    <option value="ICU">ICU</option>
                    <option value="Emergency">Emergency</option>
                </select>
            </div>
            <div class="input-group">
                <label>Discharge Report</label>
                <textarea id="releaseReport" placeholder="Enter clinical findings, patient status, etc." style="width: 100%; min-height: 100px; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; font-family: inherit; margin-top: 6px;"></textarea>
            </div>
            <div class="input-group">
                <label>Prescribed Medicines</label>
                <input type="text" id="releaseMedicines" placeholder="Medicine A, Medicine B, ..." />
            </div>
            <div class="btn-group">
                <button onclick="releaseRoom()" class="btn-secondary">Process Discharge</button>
            </div>
        </section>

        <!-- Live Status Display -->
        <div class="room-grid" id="roomsList">
            <!-- Dynamic Room Cards -->
        </div>

        <!-- Terminal Log -->
        <section id="log-container" class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>📜 System Activity Logs</h2>
                <button onclick="clearLog()" class="btn-outline" style="padding: 6px 12px; font-size: 0.8rem;">Clear</button>
            </div>
            <div id="log"></div>
        </section>
    </main>

    <script>
        let connection = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const now = new Date();
            const timestamp = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            entry.innerHTML = `<span class="log-time">${timestamp}</span> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '<div class="log-entry info">Logs cleared at ' + new Date().toLocaleTimeString() + '</div>';
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');

            if (connected) {
                statusText.textContent = 'Active Connection';
                statusDiv.className = 'status-badge connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                statusText.textContent = 'Disconnected';
                statusDiv.className = 'status-badge disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        async function connect() {
            try {
                // Use relative URL for hub or fixed local dev URL
                const hubUrl = window.location.origin.includes('localhost') 
                    ? "/appointmentHub" 
                    : "https://localhost:7250/appointmentHub";

                connection = new signalR.HubConnectionBuilder()
                    .withUrl(hubUrl)
                    .withAutomaticReconnect()
                    .configureLogging(signalR.LogLevel.Information)
                    .build();

                // SignalR Listeners
                connection.on("JoinedGroup", (data) => {
                    log(`✅ Subscribed to <strong>${data.groupName}</strong>`, 'success');
                });

                connection.on("ReceiveAvailableRooms", (data) => {
                    if (data.success) {
                        log(`📋 Loaded ${data.rooms.length} units for <strong>${data.roomType}</strong> (Dept: ${data.departmentId})`, 'success');
                        displayRooms(data.rooms);
                    } else {
                        log(`❌ Fetch Error: ${data.message}`, 'error');
                    }
                });

                connection.on("BlockRoomResult", (data) => {
                    if (data.success) {
                        log(`🔒 Room <strong>#${data.roomNumber}</strong> is now blocked for assignment.`, 'success');
                        
                        // Setup Appointment Section
                        const doctorSelect = document.getElementById('primaryDoctorId');
                        const createAppBtn = document.getElementById('createAppBtn');
                        const appSection = document.getElementById('appointmentSection');
                        
                        doctorSelect.innerHTML = '<option value="">Select Primary Physician</option>';
                        data.assignedDoctors.forEach(d => {
                            const option = document.createElement('option');
                            option.value = d.doctorId;
                            option.textContent = `${d.doctorName}`;
                            doctorSelect.appendChild(option);
                        });

                        document.getElementById('appointmentRoomId').value = data.roomId;
                        createAppBtn.disabled = false;
                        appSection.classList.add('active');
                        
                        appSection.scrollIntoView({ behavior: 'smooth' });
                    } else {
                        log(`❌ Locking Failed: ${data.message}`, 'error');
                    }
                });

                connection.on("RoomStatusChanged", (data) => {
                    log(`🔄 <strong>Room #${data.roomNumber}</strong> status changed to <strong>${data.status}</strong>`, 'info');
                    getAvailableRooms(); // Refresh view
                });

                connection.on("AppointmentCreationResult", (data) => {
                    if (data.success) {
                        log(`✅ Appointment finalized successfully!`, 'success');
                        document.getElementById('appointmentSection').classList.remove('active');
                        document.getElementById('createAppBtn').disabled = true;
                        document.getElementById('appointmentRoomId').value = '';
                    } else {
                        log(`❌ Creation Failed: ${data.message}`, 'error');
                    }
                });

                connection.on("AppointmentCreated", (data) => {
                    log(`📅 New intake registered in room <strong>#${data.roomNumber}</strong>`, 'info');
                });

                connection.on("ReleaseRoomResult", (data) => {
                    if (data.success) {
                        log(`🔓 Room released and ready for next intake.`, 'success');
                    } else {
                        log(`❌ Release Denied: ${data.message}`, 'error');
                    }
                });

                await connection.start();
                log('🟢 SignalR Pipeline Established', 'success');
                updateStatus(true);
                
                // Auto-join first group
                joinGroup();
            } catch (err) {
                log(`❌ Connection Error: ${err.message}`, 'error');
                updateStatus(false);
            }
        }

        async function disconnect() {
            if (connection) {
                await connection.stop();
                log('🔴 Connection Terminated', 'info');
                updateStatus(false);
            }
        }

        async function joinGroup() {
            if (!connection) { connect(); return; }
            const departmentId = parseInt(document.getElementById('departmentId').value);
            const roomType = document.getElementById('roomType').value;
            try {
                await connection.invoke("JoinDepartmentRoomGroup", departmentId, roomType);
                log(`Subscribing to ${roomType}s in Department ${departmentId}...`, 'info');
            } catch (err) { log(`❌ Group Error: ${err.message}`, 'error'); }
        }

        async function getAvailableRooms() {
            const departmentId = parseInt(document.getElementById('departmentId').value);
            const roomType = document.getElementById('roomType').value;
            try {
                await connection.invoke("GetAvailableRoomsByDepartment", departmentId, roomType);
            } catch (err) { log(`❌ Refresh Error: ${err.message}`, 'error'); }
        }

        async function blockRoom(id, type) {
            const roomId = id || parseInt(document.getElementById('blockRoomId').value);
            const roomType = type || document.getElementById('roomType').value;
            
            if (!roomId) { log('⚠️ Please select or enter a Room ID', 'error'); return; }
            
            try {
                await connection.invoke("BlockRoomSlot", roomId, roomType);
                log(`Attempting to lock room #${roomId}...`, 'info');
            } catch (err) { log(`❌ Lock Error: ${err.message}`, 'error'); }
        }

        async function createAppointment() {
            const roomType = document.getElementById('roomType').value;
            const dto = {
                createdBy: document.getElementById('createdBy').value,
                patientId: document.getElementById('patientId').value,
                roomId: parseInt(document.getElementById('appointmentRoomId').value),
                primaryDoctorId: document.getElementById('primaryDoctorId').value,
                startTime: new Date().toISOString(),
                endTime: null
            };

            if (!dto.primaryDoctorId) { log('⚠️ Please select an assigned physician', 'error'); return; }

            try {
                await connection.invoke("CreateAppointmentWithDoctor", dto, roomType);
            } catch (err) { log(`❌ Finalize Error: ${err.message}`, 'error'); }
        }

        async function releaseRoom() {
            const roomId = parseInt(document.getElementById('releaseRoomId').value);
            const roomType = document.getElementById('releaseRoomType').value;
            const doctorId = document.getElementById('releaseDoctorId').value;

            if (!roomId) { log('⚠️ Enter Room ID for discharge', 'error'); return; }

            const reportText = document.getElementById('releaseReport').value || "Patient discharged via Dashboard";
            const medicinesText = document.getElementById('releaseMedicines').value;
            const medicinesArray = medicinesText ? medicinesText.split(',').map(m => m.trim()) : [];

            const reportDto = {
                id: 0,
                report: reportText,
                medicines: medicinesArray,
                endTime: new Date().toISOString(),
                CreatedBy: doctorId
            };

            try {
                await connection.invoke("ReleaseRoom", doctorId, roomId, roomType, reportDto);
                log(`Processing discharge for room #${roomId}...`, 'info');
            } catch (err) { log(`❌ Discharge Error: ${err.message}`, 'error'); }
        }

        function displayRooms(rooms) {
            const roomsList = document.getElementById('roomsList');
            roomsList.innerHTML = '';

            if (rooms.length === 0) {
                roomsList.innerHTML = '<div class="glass-panel" style="grid-column: 1/-1; text-align:center; padding: 40px;">No available units found for this category.</div>';
                return;
            }

            rooms.forEach((room, index) => {
                const isAvailable = room.status === 'Available';
                const card = document.createElement('div');
                card.className = `room-card ${room.status.toLowerCase()} ${room.roomType}`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <span class="type-badge">${room.roomType}</span>
                    <div class="room-number">#${room.number}</div>
                    <div class="room-dept">${room.departmentName}</div>
                    <div class="room-status">
                        <span class="status-dot"></span>
                        ${room.status}
                    </div>
                    <div class="doctor-list">
                        ${room.assignedDoctors.length > 0 
                            ? room.assignedDoctors.map(d => `<div class="doctor-item">${d.doctorName}</div>`).join('')
                            : '<div class="doctor-item">No doctors assigned</div>'}
                    </div>
                `;

                if (isAvailable) {
                    card.onclick = () => {
                        document.getElementById('blockRoomId').value = room.id;
                        blockRoom(room.id, room.roomType);
                    };
                }
                
                roomsList.appendChild(card);
            });
        }

        // Initialize
        window.addEventListener('load', () => {
            log('System initialized. Please connect to the SignalR Hub.', 'info');
        });
